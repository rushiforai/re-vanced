name: Commit puller

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Patch bundle updater"]
    types:
      - completed

jobs:
  get-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Require "Patch bundle updater" to have succeeded
        if: ${{ github.event_name == 'workflow_run' }}
        shell: bash
        run: |
          echo "Triggered by workflow_run:"
          echo "  name='${{ github.event.workflow_run.name }}'"
          echo "  id='${{ github.event.workflow_run.id }}'"
          echo "  conclusion='${{ github.event.workflow_run.conclusion }}'"
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "::error::Patch bundle updater workflow did not succeed (conclusion='${{ github.event.workflow_run.conclusion }}')."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download changed files from triggering run
        if: ${{ github.event_name == 'workflow_run' }}
        id: download_changed_files
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
          run_id: ${{ github.event.workflow_run.id }}
          name: changed_files
          path: ReVanced-Patch-Bundles/patch_bundle_updater_artifact
          if_no_artifact_found: ignore

      - name: Download commit SHA from triggering run
        if: ${{ github.event_name == 'workflow_run' }}
        id: download_commit_sha
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
          run_id: ${{ github.event.workflow_run.id }}
          name: commit_sha
          path: ReVanced-Patch-Bundles/commit_sha_artifact
          if_no_artifact_found: ignore

      - name: Download updated bundle summary from triggering run
        if: ${{ github.event_name == 'workflow_run' }}
        id: download_updated_bundles
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
          run_id: ${{ github.event.workflow_run.id }}
          name: updated_bundles
          path: ReVanced-Patch-Bundles/patch_bundle_updater_artifact
          if_no_artifact_found: ignore

      - name: Download bundle changelog from triggering run
        if: ${{ github.event_name == 'workflow_run' }}
        id: download_bundle_changelog
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
          run_id: ${{ github.event.workflow_run.id }}
          name: bundle_changelog
          path: ReVanced-Patch-Bundles/patch_bundle_updater_artifact
          if_no_artifact_found: ignore

      - name: Verify artifact presence
        if: ${{ github.event_name == 'workflow_run' }}
        id: verify_artifact
        shell: bash
        run: |
          changed_files="$(find ReVanced-Patch-Bundles/patch_bundle_updater_artifact -type f -name changed_files.txt -size +0c -print -quit 2>/dev/null || true)"
          if [ -n "$changed_files" ]; then
            echo "has_artifact=true" >> "$GITHUB_OUTPUT"
            echo "changed_files=$changed_files" >> "$GITHUB_OUTPUT"
            echo "Found changed files artifact: $changed_files"
          else
            echo "has_artifact=false" >> "$GITHUB_OUTPUT"
            echo "changed_files=" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop (no artifact for this run)
        if: ${{ github.event_name == 'workflow_run' && steps.verify_artifact.outputs.has_artifact != 'true' }}
        run: |
          echo "No 'changed_files' artifact found for the triggering run. There were no patch-bundle changes to notify."
          exit 0

      - name: Try to read explicit commit SHA from artifact
        if: ${{ github.event_name != 'workflow_run' || steps.verify_artifact.outputs.has_artifact == 'true' }}
        id: read_sha
        shell: bash
        run: |
          set -euo pipefail
          SHA_FILE="$(find ReVanced-Patch-Bundles -type f -iname 'commit_sha.txt' -print -quit || true)"
          if [ -n "${SHA_FILE:-}" ]; then
            COMMIT_SHA="$(sed -n '1p' "$SHA_FILE" | tr -d '\r' | xargs || true)"
            if [ -n "$COMMIT_SHA" ]; then
              echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
              echo "Found commit_sha.txt with SHA: $COMMIT_SHA"
              exit 0
            fi
          fi
          echo "No explicit commit_sha.txt found (will search by time window)."

      - name: Install dependencies
        if: ${{ github.event_name != 'workflow_run' || steps.verify_artifact.outputs.has_artifact == 'true' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run find_commit.py (strict to triggering run; fail if not found)
        if: ${{ github.event_name != 'workflow_run' || steps.verify_artifact.outputs.has_artifact == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: bundles
          ACTOR_LOGIN: github-actions[bot]
          WORKFLOW_RUN_STARTED_AT: ${{ github.event.workflow_run.run_started_at }}
          WORKFLOW_RUN_UPDATED_AT: ${{ github.event.workflow_run.updated_at }}
          MAX_AGE_MINUTES: "2"
          STRICT_TO_TRIGGERING_RUN: "true"
          REQUIRED_COMMIT_MSG_PREFIX: ""
          COMMIT_SHA: ${{ steps.read_sha.outputs.commit_sha }}
        run: |
          python scripts/find_commit.py

      - name: Create commit link artifact
        if: ${{ github.event_name != 'workflow_run' || steps.verify_artifact.outputs.has_artifact == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: commit-link
          path: commit-link.txt

      - name: Stage Discord webhook artifacts
        if: ${{ github.event_name == 'workflow_run' && steps.verify_artifact.outputs.has_artifact == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          source_dir="ReVanced-Patch-Bundles/patch_bundle_updater_artifact"
          dest_dir="ReVanced-Patch-Bundles/webhook_artifacts"
          mkdir -p "$dest_dir"
          cp "$source_dir/changed_files.txt" "$dest_dir/changed_files.txt"
          for name in updated-bundles.txt bundle-changelog.md; do
            if [ -s "$source_dir/$name" ]; then
              cp "$source_dir/$name" "$dest_dir/$name"
            fi
          done

      - name: Pass through changed files artifact
        if: ${{ github.event_name == 'workflow_run' && steps.verify_artifact.outputs.has_artifact == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: changed_files
          path: ReVanced-Patch-Bundles/webhook_artifacts/changed_files.txt

      - name: Pass through updated bundles artifact
        if: ${{ github.event_name == 'workflow_run' && steps.verify_artifact.outputs.has_artifact == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: updated_bundles
          path: ReVanced-Patch-Bundles/webhook_artifacts/updated-bundles.txt
          if-no-files-found: ignore

      - name: Pass through bundle changelog artifact
        if: ${{ github.event_name == 'workflow_run' && steps.verify_artifact.outputs.has_artifact == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle_changelog
          path: ReVanced-Patch-Bundles/webhook_artifacts/bundle-changelog.md
          if-no-files-found: ignore
