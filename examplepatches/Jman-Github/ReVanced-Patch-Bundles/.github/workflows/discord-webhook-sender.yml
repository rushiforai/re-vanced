name: Webhook sender

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Commit puller"]
    types:
      - completed

jobs:
  webhook_sender:
    name: webhook sender
    runs-on: ubuntu-latest
    steps:
      - name: Require "Commit puller" to have succeeded
        if: ${{ github.event_name == 'workflow_run' }}
        shell: bash
        run: |
          echo "Triggered by workflow_run:"
          echo "  name='${{ github.event.workflow_run.name }}'"
          echo "  id='${{ github.event.workflow_run.id }}'"
          echo "  conclusion='${{ github.event.workflow_run.conclusion }}'"
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "::error::Commit puller workflow did not succeed (conclusion='${{ github.event.workflow_run.conclusion }}'). Failing this workflow."
            exit 1
          fi

      - name: Create patch bundle updater artifact directory
        run: mkdir -p ReVanced-Patch-Bundles/patch_bundle_updater_artifact

      - name: Create commit puller artifact directory
        run: mkdir -p ReVanced-Patch-Bundles/commit_puller_artifact

      - name: Download changed files from Commit puller
        if: ${{ github.event_name == 'workflow_run' }}
        id: download_patch_bundle_updater_artifact
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
          run_id: ${{ github.event.workflow_run.id }}
          name: changed_files
          path: ReVanced-Patch-Bundles/patch_bundle_updater_artifact
          if_no_artifact_found: ignore

      - name: Download updated bundle summary from Commit puller
        if: ${{ github.event_name == 'workflow_run' }}
        id: download_patch_bundle_summary_artifact
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
          run_id: ${{ github.event.workflow_run.id }}
          name: updated_bundles
          path: ReVanced-Patch-Bundles/patch_bundle_updater_artifact
          if_no_artifact_found: ignore

      - name: Download bundle changelog from Commit puller
        if: ${{ github.event_name == 'workflow_run' }}
        id: download_patch_bundle_changelog_artifact
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
          run_id: ${{ github.event.workflow_run.id }}
          name: bundle_changelog
          path: ReVanced-Patch-Bundles/patch_bundle_updater_artifact
          if_no_artifact_found: ignore

      - name: Download Artifact from Commit puller
        if: ${{ github.event_name == 'workflow_run' }}
        id: download_commit_puller_artifact
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
          run_id: ${{ github.event.workflow_run.id }}
          name: commit-link
          path: ReVanced-Patch-Bundles/commit_puller_artifact
          if_no_artifact_found: ignore

      - name: Verify webhook artifacts
        id: verify_webhook_artifacts
        shell: bash
        run: |
          find_first() {
            local root="$1"
            local name="$2"
            find "$root" -type f -name "$name" -size +0c -print -quit 2>/dev/null || true
          }

          commit_link="$(find_first "ReVanced-Patch-Bundles/commit_puller_artifact" "commit-link.txt")"
          changes_file="$(find_first "ReVanced-Patch-Bundles/patch_bundle_updater_artifact" "changed_files.txt")"
          summary_file="$(find_first "ReVanced-Patch-Bundles/patch_bundle_updater_artifact" "updated-bundles.txt")"
          changelog_file="$(find_first "ReVanced-Patch-Bundles/patch_bundle_updater_artifact" "bundle-changelog.md")"

          has_commit_link=false
          has_payload=false
          if [ -n "$commit_link" ]; then
            has_commit_link=true
          fi
          if [ -n "$changes_file" ] || [ -n "$summary_file" ] || [ -n "$changelog_file" ]; then
            has_payload=true
          fi
          ready=false
          if [ "$has_commit_link" = true ] && [ "$has_payload" = true ]; then
            ready=true
          fi

          {
            echo "has_commit_link=$has_commit_link"
            echo "has_payload=$has_payload"
            echo "ready=$ready"
          } >> "$GITHUB_OUTPUT"

          echo "commit-link: ${commit_link:-missing}"
          echo "changed files: ${changes_file:-missing}"
          echo "updated bundles: ${summary_file:-missing}"
          echo "bundle changelog: ${changelog_file:-missing}"

      - name: Stop (missing webhook artifacts)
        if: ${{ steps.verify_webhook_artifacts.outputs.ready != 'true' }}
        run: |
          echo "Missing commit-link or patch bundle update data artifacts. Skipping Discord notification to avoid an empty embed."

      - name: Debug — list what we have
        if: ${{ steps.verify_webhook_artifacts.outputs.ready == 'true' }}
        run: |
          echo "=== Workspace tree ==="
          ls -R

      - name: Build embed description
        if: ${{ steps.verify_webhook_artifacts.outputs.ready == 'true' }}
        id: set_changes
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          def pick_exact(path):
              try:
                  return path if os.path.isfile(path) and os.path.getsize(path) > 0 else None
              except OSError:
                  return None

          def pick_artifact(root, filename):
              exact = pick_exact(str(Path(root) / filename))
              if exact:
                  return exact
              matches = [
                  path for path in Path(root).rglob(filename)
                  if path.is_file() and path.stat().st_size > 0
              ]
              if not matches:
                  return None
              matches.sort(key=lambda path: (len(path.parts), str(path)))
              return str(matches[0])

          def read_trimmed(path):
              if not path:
                  return ''
              try:
                  with open(path, 'r', encoding='utf-8', errors='ignore') as fh:
                      lines = fh.read().splitlines()
                  while lines and not lines[0].strip():
                      lines.pop(0)
                  while lines and not lines[-1].strip():
                      lines.pop()
                  return '\n'.join(lines)
              except OSError:
                  return ''

          def shorten_paths(text):
              lines = text.splitlines()
              adjusted = []
              for line in lines:
                  if not line.strip():
                      adjusted.append('')
                      continue
                  trimmed = line.lstrip()
                  leading = line[: len(line) - len(trimmed)]
                  marker = ''
                  remainder = trimmed
                  if remainder and remainder[0] in '-*•':
                      marker = remainder[0]
                      remainder = remainder[1:]
                      if remainder.startswith(' '):
                          remainder = remainder[1:]
                          prefix = leading + marker + ' '
                      else:
                          prefix = leading + marker
                  else:
                      prefix = leading
                  content = remainder.strip()
                  if '/' in content:
                      content = content.rsplit('/', 1)[-1]
                  adjusted.append(prefix + content)
              while adjusted and adjusted[0] == '':
                  adjusted.pop(0)
              while adjusted and adjusted[-1] == '':
                  adjusted.pop()
              return '\n'.join(adjusted)

          def trim_lines(text, max_lines=15):
              if not text:
                  return ''
              lines = text.splitlines()
              if len(lines) <= max_lines:
                  return '\n'.join(lines)
              trimmed = lines[:max_lines]
              trimmed.append('...')
              return '\n'.join(trimmed)

          changes_file = pick_artifact('ReVanced-Patch-Bundles/patch_bundle_updater_artifact', 'changed_files.txt')
          summary_file = pick_artifact('ReVanced-Patch-Bundles/patch_bundle_updater_artifact', 'updated-bundles.txt')
          changelog_file = pick_artifact('ReVanced-Patch-Bundles/patch_bundle_updater_artifact', 'bundle-changelog.md')
          commit_file = pick_artifact('ReVanced-Patch-Bundles/commit_puller_artifact', 'commit-link.txt')

          changes = read_trimmed(changes_file)
          summary = read_trimmed(summary_file)
          changelog = read_trimmed(changelog_file)
          commit  = read_trimmed(commit_file)

          formatted_changes = shorten_paths(changes) if changes else ''
          changes_text = formatted_changes.strip()
          summary_text = summary.strip()
          changelog_text = trim_lines(changelog, max_lines=18) if changelog else ''

          if not (changes_text or summary_text or changelog_text):
              raise SystemExit('No non-empty update artifacts found; refusing to send an empty Discord embed.')

          parts = []
          parts.append("Patch-bundle.json file(s) have been successfully updated by the [Patch Bundle Updater Workflow](https://github.com/Jman-Github/ReVanced-Patch-Bundles/actions/workflows/patch-bundle-updater.yml).")
          if changes_text:
              parts.append(f"**Changes:**\n```\n{changes_text}\n```")
          if summary_text:
              parts.append(f"**Summary:**\n```\n{summary_text}\n```")
          if changelog_text:
              parts.append(f"**Changelog:**\n```\n{changelog_text}\n```")
          if commit.strip():
              parts.append(commit.strip())

          embed_description = "\n\n".join(parts)

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              out.write('embed_description<<EOF\n' + embed_description + '\nEOF\n')

          print(f"::notice::changes file={changes_file or 'none'}")
          print(f"::notice::summary file={summary_file or 'none'}")
          print(f"::notice::changelog file={changelog_file or 'none'} present={'yes' if bool(changelog_text) else 'no'}")
          print(f"::notice::commit  file={commit_file  or 'none'} present={'yes' if bool(commit.strip()) else 'no'}")
          PY

      - name: Send Discord Notification
        if: ${{ steps.verify_webhook_artifacts.outputs.ready == 'true' }}
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          EMBED_DESCRIPTION: ${{ steps.set_changes.outputs.embed_description }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          webhook_url = os.environ["WEBHOOK_URL"]
          if not webhook_url:
              print("WEBHOOK_URL is not set", file=sys.stderr)
              sys.exit(1)

          description = os.environ["EMBED_DESCRIPTION"]
          if len(description) > 4096:
              description = description[:4093] + "..."

          payload = {
              "content": "||@everyone||",
              "username": "ReVanced-Patch-Bundles",
              "avatar_url": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQzUECg_ITr7YkE2pYiVdHqTxlg3wLwXKXIQrcxEBKd7Q&s",
              "embeds": [
                  {
                      "title": "Patch-Bundle.json File(s) Updated",
                      "description": description,
                      "color": 65280,
                      "author": {
                          "name": "Patch Bundle Updater Workflow",
                          "icon_url": "https://github.gallerycdn.vsassets.io/extensions/github/vscode-github-actions/0.26.2/1694016984133/Microsoft.VisualStudio.Services.Icons.Default",
                      },
                      "thumbnail": {
                          "url": "https://cdn-icons-png.flaticon.com/512/5278/5278658.png",
                      },
                  }
              ],
          }

          request = urllib.request.Request(
              webhook_url + "?wait=true",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Accept": "application/json",
                  "Content-Type": "application/json",
                  "User-Agent": "ReVanced-Patch-Bundles GitHub Actions webhook sender",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  print(f"Discord webhook status: {response.status}")
          except urllib.error.HTTPError as error:
              print(error.read().decode("utf-8", errors="replace"), file=sys.stderr)
              raise
          PY
