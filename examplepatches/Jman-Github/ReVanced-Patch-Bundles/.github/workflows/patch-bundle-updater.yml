name: Patch bundle updater

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write
  packages: read

jobs:
  check_for_updates:
    name: Check for bundle updates
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: bundles

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
        working-directory: ${{ github.workspace }}

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Run generate_bundles.py
        id: run_generate_bundles
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python scripts/generate_bundles.py
        working-directory: ${{ github.workspace }}

      - name: Grant execute permission
        run: chmod +x ./bundle-parser/gradlew

      - name: Validate package token
        shell: bash
        run: |
          if [ -z "${{ secrets.GH_PAT }}" ]; then
            echo "::error::GH_PAT secret is missing. Set GH_PAT to a classic PAT with read:packages (and repo if needed), then rerun."
            exit 1
          fi

      - name: Generate patches list
        env:
          GITHUB_ACTOR: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: ./bundle-parser/gradlew --project-dir bundle-parser "-Pgpr.user=${{ github.repository_owner }}" "-Pgpr.key=${{ secrets.GH_PAT }}" run

      - name: Generate patch list catalog
        run: |
          python scripts/generate_patch_list_catalog.py
          black scripts/generate_patch_list_catalog.py

      - name: Validate generated JSON
        run: python scripts/validate_json.py

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run MyPy
        run: python -m mypy scripts/generate_bundles.py scripts/check_readme.py scripts/find_commit.py scripts/validate_json.py

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit new files
        run: |
          git add '*.json' patch-bundles/PATCH-LIST-CATALOG.md
          if git diff --cached --quiet; then
            echo "No changes to commit. Exiting..."
            echo "has_changes=false" >> $GITHUB_ENV
          else
            git commit -m 'feat: `patch-bundles` update'
            echo "has_changes=true" >> $GITHUB_ENV
          fi

      - name: Find commit for changed files
        id: find_commit
        if: env.has_changes == 'true'
        shell: bash
        run: |
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            changed_files="$(git diff --name-only HEAD~1 HEAD -- '*.json' patch-bundles/PATCH-LIST-CATALOG.md)"
          else
            changed_files="$(git show --name-only --pretty='' HEAD -- '*.json' patch-bundles/PATCH-LIST-CATALOG.md)"
          fi
          if [ -z "$changed_files" ]; then
            echo "::error::Committed changes, but no changed patch-bundle files were detected."
            exit 1
          else
            printf "%s\n" "$changed_files" > changed_files.txt
            echo "changed_files=changed_files.txt" >> "$GITHUB_ENV"
          fi

      - name: Build summary of updated bundles
        if: env.has_changes == 'true' && env.changed_files != ''
        run: python scripts/build_updated_bundles.py

      - name: Record commit SHA
        if: env.has_changes == 'true'
        id: record_sha
        shell: bash
        run: |
          SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          URL="https://github.com/${{ github.repository }}/commit/$SHA"
          {
            echo "sha=$SHA"
            echo "short_sha=$SHORT_SHA"
            echo "url=$URL"
          } > commit_info.txt
          echo "$SHA" > commit_sha.txt
          echo "commit_sha=$SHA" >> "$GITHUB_ENV"
          echo "commit_url=$URL" >> "$GITHUB_ENV"

      - name: Push changes
        if: env.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:bundles

      - name: Create artifact of commit SHA
        if: env.has_changes == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: commit_sha
          path: |
            commit_sha.txt
            commit_info.txt

      - name: Create artifact of changed files
        if: env.has_changes == 'true' && env.changed_files != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: changed_files
          path: changed_files.txt

      - name: Create artifact of updated bundles
        if: env.has_changes == 'true' && env.changed_files != '' && env.has_bundle_updates == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: updated_bundles
          path: updated-bundles.txt

      - name: Create artifact of bundle changelog
        if: env.has_changes == 'true' && env.changed_files != '' && env.has_bundle_updates == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle_changelog
          path: bundle-changelog.md
