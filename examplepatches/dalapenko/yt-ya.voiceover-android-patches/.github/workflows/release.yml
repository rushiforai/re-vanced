name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release Patches
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Check tag matches Version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#v}"
          PATCH_VERSION=$(perl -ne 'print $1 if /attributes\["Version"\]\s*=\s*"([^"]+)"/' patches/build.gradle.kts)
          echo "Tag version   : $TAG_VERSION"
          echo "Patch version : $PATCH_VERSION"
          if [ "$TAG_VERSION" != "$PATCH_VERSION" ]; then
            echo "ERROR: tag '$TAG_NAME' does not match Version '$PATCH_VERSION' in patches/build.gradle.kts"
            exit 1
          fi

      - name: Setup Gradle Credentials
        run: |
          mkdir -p ~/.gradle
          echo "githubPackagesUsername=${{ github.actor }}" >> ~/.gradle/gradle.properties
          echo "githubPackagesPassword=${{ secrets.GITHUB_TOKEN }}" >> ~/.gradle/gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> ~/.gradle/gradle.properties

      - name: Build Patches
        run: ./gradlew buildAndroid

      - name: Update patches.json
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          python3 -c "
          import json, os, datetime
          
          repo = os.environ['REPO']
          tag = os.environ['TAG']
          created_at = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%S')
          download_url = f'https://github.com/{repo}/releases/download/{tag}/patches.rvp'
          
          data = {
              'created_at': created_at,
              'description': f'Yandex Voice Over Translation Patches release {tag}',
              'download_url': download_url,
              'signature_download_url': 'N/A',
              'version': tag
          }
          
          with open('patches.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Commit and push patches.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add patches.json
          git commit -m "chore: update patches.json to ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: patches/build/libs/patches.rvp
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
