name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  format:
    name: treefmt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix flake check --no-build

  build-patches:
    name: Build patches (.rvp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6
      - name: Assemble .rvp
        working-directory: patches
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_gpr_user: ${{ github.actor }}
          ORG_GRADLE_PROJECT_gpr_key: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
        run: ../gradlew :patches:build
      - uses: actions/upload-artifact@v7
        with:
          name: mtga-patches
          path: patches/patches/build/libs/*.rvp
          if-no-files-found: error

  build-mod:
    name: Build LSPosed module APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools build-tools;35.0.0 platforms;android-34 platforms;android-35'
      - uses: gradle/actions/setup-gradle@v6
      - name: Assemble debug APK
        working-directory: mod
        run: ../gradlew :app:assembleDebug
      - uses: actions/upload-artifact@v7
        with:
          name: mtga-module
          path: mod/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
