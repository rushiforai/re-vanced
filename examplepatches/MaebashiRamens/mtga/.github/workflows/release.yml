name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write
  packages: read

jobs:
  release:
    name: Build and publish artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools build-tools;35.0.0 platforms;android-34 platforms;android-35'

      - uses: gradle/actions/setup-gradle@v6

      - name: Resolve version
        id: meta
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          echo "tag=$tag"         >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Assemble .rvp
        working-directory: patches
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_gpr_user: ${{ github.actor }}
          ORG_GRADLE_PROJECT_gpr_key: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
        run: ../gradlew :patches:build

      - name: Assemble LSPosed module APK
        working-directory: mod
        run: ../gradlew :app:assembleDebug

      - name: Stage artifacts
        run: |
          mkdir -p release
          ver="${{ steps.meta.outputs.version }}"
          rvp=$(ls patches/patches/build/libs/patches-*.rvp \
                | grep -v sources | head -1)
          apk=$(ls mod/app/build/outputs/apk/debug/*.apk | head -1)
          cp "$rvp" "release/mtga-patches-${ver}.rvp"
          cp "$apk" "release/mtga-module-${ver}.apk"

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          files: |
            release/*.rvp
            release/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
