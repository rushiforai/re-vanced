name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build application
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew.bat packageMsi

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: build/compose/binaries/main/msi/*.msi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build application
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew packageDmg

      - name: Upload macOS application
        uses: actions/upload-artifact@v4
        with:
          name: macos-application
          path: build/compose/binaries/main/dmg/*.dmg

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build application
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew packageDeb packageRpm

      - name: Upload Linux executables
        uses: actions/upload-artifact@v4
        with:
          name: linux-executables
          path: |
            build/compose/binaries/main/deb/*.deb
            build/compose/binaries/main/rpm/*.rpm

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate changelog
        id: changelog
        uses: ardalanamini/auto-changelog@v4.0.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          release-name: ${{ github.ref_name }}
          semver: false
          mention-authors: false
          mention-new-contributors: false
          include-compare-link: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-executable/**/*.msi
            macos-application/**/*.dmg
            linux-executables/**/*.{deb,rpm}
          body: |
            ${{ steps.changelog.outputs.changelog }}

            ## Downloads

            ### Windows
            - `*.msi` - Windows installer (single file) - Double-click to install

            ### macOS
            - `*.dmg` - macOS installer (single file) - Double-click to install

            ### Linux
            - `*.deb` - Debian/Ubuntu package (single file) - Install with: `sudo dpkg -i *.deb`
            - `*.rpm` - Fedora/RHEL/CentOS package (single file) - Install with: `sudo rpm -i *.rpm`

            All installers are single files with bundled Java runtime and built-in GUI - no need to install Java separately! After installation, launch the ReVanced Web Patcher to access the GUI interface.
